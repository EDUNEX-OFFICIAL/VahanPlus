# Production Postgres + Redis on the VPS host.
# k3s pods connect via internal gateway 10.42.0.1 (not public IP).
# WAN blocked by deploy/scripts/hostinger/secure-vps.sh.
#
#   docker compose -f docker-compose.infra.prod.yml --env-file deploy/env/hostinger.env up -d

name: vahanplus

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vahanplus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-vahanplus}
    ports:
      - '127.0.0.1:54322:5432'
      - '10.42.0.1:54322:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-vahanplus}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '127.0.0.1:6379:6379'
      - '10.42.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
    external: true
    name: vahanplus_postgres_data
  redis_data:
    external: true
    name: vahanplus_redis_data
