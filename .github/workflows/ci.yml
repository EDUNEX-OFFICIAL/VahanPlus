name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Generate Prisma client
        run: pnpm --filter @vahanplus/db exec prisma generate

      - name: Validate Prisma schema
        run: pnpm db:validate

      - name: Lint and build
        run: pnpm turbo run lint build

      - name: Test api-express
        run: pnpm --filter @vahanplus/api-express test

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Helm lint
        run: helm lint deploy/helm/vahanplus

      - name: Helm template (staging)
        run: helm template vahanplus deploy/helm/vahanplus -f deploy/helm/vahanplus/values-staging.yaml > /dev/null

      - name: Helm template (prod)
        run: helm template vahanplus deploy/helm/vahanplus -f deploy/helm/vahanplus/values-prod.yaml --set secrets.existingSecret=vahanplus-app-secrets > /dev/null

      - name: Helm template (hostinger kvm4)
        run: |
          helm template vahanplus deploy/helm/vahanplus \
            -f deploy/helm/vahanplus/values-hostinger-kvm4.yaml \
            --set secrets.existingSecret=vahanplus-app-secrets \
            --set global.imageRegistry=ghcr.io/example \
            --set ingress.host=vahanplus.example.com > /dev/null
