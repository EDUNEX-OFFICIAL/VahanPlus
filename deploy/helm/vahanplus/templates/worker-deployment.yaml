{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vahanplus.fullname" . }}-worker
  labels:
    {{- include "vahanplus.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.worker.khananData.enabled }}
      volumes:
        - name: khanan-data
          hostPath:
            path: {{ .Values.worker.khananData.hostPath }}
            type: DirectoryOrCreate
      {{- end }}
      containers:
        - name: worker
          image: {{ include "vahanplus.image" (dict "Values" .Values "image" .Values.worker.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- with .Values.global.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: health
              containerPort: {{ .Values.worker.healthPort }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahanplus.secretName" . }}
                  key: databaseUrl
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahanplus.secretName" . }}
                  key: redisUrl
            - name: HEALTH_PORT
              value: {{ .Values.worker.healthPort | quote }}
            - name: BROWSER_POOL_STUB
              value: {{ .Values.worker.browserPoolStub | quote }}
            - name: WORKER_CONCURRENCY
              value: {{ .Values.worker.concurrency | quote }}
            - name: BIHAR_PORTAL_RATE_LIMIT_MAX
              value: {{ .Values.worker.portalRateLimitMax | quote }}
            - name: BIHAR_PORTAL_RATE_LIMIT_DURATION_MS
              value: {{ .Values.worker.portalRateLimitDurationMs | quote }}
            - name: BIHAR_PORTAL_POST_DELAY_MS
              value: {{ .Values.worker.portalPostDelayMs | quote }}
            - name: BIHAR_FANOUT_STAGGER_MS
              value: {{ .Values.worker.fanoutStaggerMs | quote }}
            - name: BIHAR_FETCH_TIMEOUT_MS
              value: {{ .Values.worker.fetchTimeoutMs | quote }}
            - name: BIHAR_FETCH_RETRIES
              value: {{ .Values.worker.fetchRetries | quote }}
            - name: STORE_RAW_CAPTURE
              value: {{ .Values.worker.storeRawCapture | quote }}
            {{- if .Values.worker.khananData.enabled }}
            - name: KHANAN_IMPORT_DIR
              value: {{ .Values.worker.khananData.importDir | quote }}
            - name: KHANAN_EXPORT_DIR
              value: {{ .Values.worker.khananData.exportDir | quote }}
            {{- end }}
          {{- if .Values.worker.khananData.enabled }}
          volumeMounts:
            - name: khanan-data
              mountPath: /var/lib/vahanplus
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
{{- end }}
