# Docker Desktop Kubernetes — local staging (no Ingress controller required).
# On Linux k3s VPS use values-local-k3s-vps.yaml instead (host.docker.internal does not resolve).
global:
  # IfNotPresent: use images built with `docker build` while Kubernetes is running (Docker Desktop shares them with kind).
  imagePullPolicy: IfNotPresent

apiExpress:
  replicaCount: 1
  image: vahanplus-api-express:latest

web:
  replicaCount: 1
  image: vahanplus-web:latest

worker:
  replicaCount: 1
  image: vahanplus-worker:latest
  browserPoolStub: true

ingress:
  enabled: false

networkPolicy:
  enabled: false

hpa:
  enabled: false

migrate:
  enabled: false

monitoring:
  serviceMonitor:
    enabled: false

secrets:
  existingSecret: ""
  jwtSecret: local-dev-jwt-secret
  # Postgres/Redis from: docker compose up -d postgres redis
  databaseUrl: postgresql://vahanplus:vahanplus@host.docker.internal:5434/vahanplus
  redisUrl: redis://host.docker.internal:6379
