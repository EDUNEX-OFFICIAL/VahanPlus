{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vahan360.fullname" . }}-migrate
  labels:
    {{- include "vahan360.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "vahan360.image" (dict "Values" .Values "image" .Values.apiExpress.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          workingDir: /app
          command:
            - node
            - node_modules/prisma/build/index.js
            - migrate
            - deploy
            - --schema=packages/db/prisma/schema.prisma
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahan360.secretName" . }}
                  key: databaseUrl
{{- end }}
