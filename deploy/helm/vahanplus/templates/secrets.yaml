{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vahanplus.fullname" . }}-secrets
type: Opaque
stringData:
  databaseUrl: {{ .Values.secrets.databaseUrl | quote }}
  redisUrl: {{ .Values.secrets.redisUrl | quote }}
  jwtSecret: {{ .Values.secrets.jwtSecret | quote }}
{{- end }}
