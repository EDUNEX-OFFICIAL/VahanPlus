name: Docker Publish

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    concurrency:
      group: docker-build-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            dockerfile: apps/web/Dockerfile
            image: vahanplus-web
            needs_api_url: true
          - app: api-express
            dockerfile: apps/api-express/Dockerfile
            image: vahanplus-api-express
            needs_api_url: false
          - app: worker
            dockerfile: apps/worker/Dockerfile
            image: vahanplus-worker
            needs_api_url: false
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=short,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ matrix.needs_api_url && format('NEXT_PUBLIC_API_URL={0}', vars.NEXT_PUBLIC_API_URL || secrets.NEXT_PUBLIC_API_URL || 'https://exp.vahan360.info/api') || '' }}

  sync-latest-tags:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Point :latest at commit SHA tag
        run: |
          set -euo pipefail
          SHORT="${GITHUB_SHA::7}"
          OWNER="${{ github.repository_owner }}"
          OWNER="${OWNER,,}"
          for img in vahanplus-web vahanplus-api-express vahanplus-worker; do
            SRC="ghcr.io/${OWNER}/${img}:${SHORT}"
            echo "==> ${img}:latest <- ${SRC}"
            docker buildx imagetools create -t "ghcr.io/${OWNER}/${img}:latest" "${SRC}"
          done

  deploy:
    needs: [build-and-push, sync-latest-tags]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    # Never cancel mid-helm-upgrade (leaves release in pending-upgrade).
    concurrency:
      group: docker-deploy-${{ github.ref }}
      cancel-in-progress: false
    # Runs on the VPS (self-hosted). Cloud runners cannot reach :22 (Hostinger firewall).
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /opt/vahanplus
    steps:
      - name: Sync repo and Helm rollout
        run: |
          set -euo pipefail
          export IMAGE_TAG="${GITHUB_SHA::7}"
          export ENV_FILE=/opt/vahanplus/deploy/env/hostinger.env
          export KUBECONFIG="${KUBECONFIG:-/etc/rancher/k3s/k3s.yaml}"
          git fetch origin main master 2>/dev/null || true
          git checkout -q main 2>/dev/null || git checkout -q master 2>/dev/null || true
          git pull --ff-only
          chmod +x deploy/scripts/rollout-ghcr.sh deploy/scripts/verify-live-images.sh
          ./deploy/scripts/rollout-ghcr.sh
          EXPECTED_IMAGE_TAG="${GITHUB_SHA::7}" ./deploy/scripts/verify-live-images.sh
