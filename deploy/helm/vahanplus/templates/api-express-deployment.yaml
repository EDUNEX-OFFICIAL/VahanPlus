{{- if .Values.apiExpress.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vahanplus.fullname" . }}-api-express
  labels:
    {{- include "vahanplus.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-express
spec:
  replicas: {{ .Values.apiExpress.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api-express
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api-express
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.apiExpress.khananData.enabled }}
      volumes:
        - name: khanan-data
          hostPath:
            path: {{ .Values.apiExpress.khananData.hostPath }}
            type: DirectoryOrCreate
      {{- end }}
      containers:
        - name: api-express
          image: {{ include "vahanplus.image" (dict "Values" .Values "image" .Values.apiExpress.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- with .Values.global.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.apiExpress.port }}
          env:
            - name: PORT
              value: {{ .Values.apiExpress.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahanplus.secretName" . }}
                  key: databaseUrl
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahanplus.secretName" . }}
                  key: redisUrl
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahanplus.secretName" . }}
                  key: jwtSecret
            {{- if .Values.apiExpress.corsOrigins }}
            - name: CORS_ORIGINS
              value: {{ .Values.apiExpress.corsOrigins | quote }}
            {{- end }}
            {{- if .Values.apiExpress.reportingReadModel }}
            - name: REPORTING_READ_MODEL
              value: "true"
            {{- end }}
            {{- if .Values.apiExpress.khananData.enabled }}
            - name: KHANAN_IMPORT_DIR
              value: {{ .Values.apiExpress.khananData.importDir | quote }}
            - name: KHANAN_EXPORT_DIR
              value: {{ .Values.apiExpress.khananData.exportDir | quote }}
            {{- end }}
            {{- if .Values.otel.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            {{- end }}
          {{- if .Values.apiExpress.khananData.enabled }}
          volumeMounts:
            - name: khanan-data
              mountPath: /var/lib/vahanplus
          {{- end }}
          resources:
            {{- toYaml .Values.apiExpress.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiExpress.port }}
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.apiExpress.port }}
            initialDelaySeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vahanplus.fullname" . }}-api-express
  labels:
    {{- include "vahanplus.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-express
spec:
  selector:
    app.kubernetes.io/component: api-express
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.apiExpress.port }}
      targetPort: {{ .Values.apiExpress.port }}
{{- end }}
