{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "vahanplus.fullname" . }}
  labels:
    {{- include "vahanplus.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "vahanplus.fullname" . }}-api-express
                port:
                  number: {{ .Values.apiExpress.port }}
          {{- if .Values.apiNest.enabled }}
          - path: /v2
            pathType: Prefix
            backend:
              service:
                name: {{ include "vahanplus.fullname" . }}-api-nest
                port:
                  number: {{ .Values.apiNest.port }}
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "vahanplus.fullname" . }}-web
                port:
                  number: {{ .Values.web.port }}
{{- end }}
