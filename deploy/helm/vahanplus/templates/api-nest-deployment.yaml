{{- if .Values.apiNest.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vahanplus.fullname" . }}-api-nest
  labels:
    {{- include "vahanplus.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-nest
spec:
  replicas: {{ .Values.apiNest.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: api-nest
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api-nest
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api-nest
          image: {{ include "vahanplus.image" (dict "Values" .Values "image" .Values.apiNest.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- with .Values.global.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.apiNest.port }}
          env:
            - name: NEST_PORT
              value: {{ .Values.apiNest.port | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vahanplus.secretName" . }}
                  key: databaseUrl
          resources:
            {{- toYaml .Values.apiNest.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /v2/health
              port: {{ .Values.apiNest.port }}
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: {{ .Values.apiNest.port }}
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vahanplus.fullname" . }}-api-nest
  labels:
    {{- include "vahanplus.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-nest
spec:
  selector:
    app.kubernetes.io/component: api-nest
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.apiNest.port }}
      targetPort: {{ .Values.apiNest.port }}
{{- end }}
