name: Docker Publish

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            dockerfile: apps/web/Dockerfile
            image: vahanplus-web
            needs_api_url: true
          - app: api-express
            dockerfile: apps/api-express/Dockerfile
            image: vahanplus-api-express
            needs_api_url: false
          - app: worker
            dockerfile: apps/worker/Dockerfile
            image: vahanplus-worker
            needs_api_url: false
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ${{ matrix.needs_api_url && format('NEXT_PUBLIC_API_URL={0}', vars.NEXT_PUBLIC_API_URL || secrets.NEXT_PUBLIC_API_URL || 'https://exp.vahan360.info/api') || '' }}

  deploy:
    needs: build-and-push
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image tag (short SHA)
        id: tag
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Deploy to VPS (Helm rollout)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            export IMAGE_TAG="${{ steps.tag.outputs.short }}"
            REPO="${{ vars.DEPLOY_REPO_PATH || '/opt/vahanplus' }}"
            cd "$REPO"
            git fetch origin main master 2>/dev/null || true
            git checkout -q main 2>/dev/null || git checkout -q master 2>/dev/null || true
            git pull --ff-only 2>/dev/null || true
            chmod +x deploy/scripts/rollout-ghcr.sh
            ./deploy/scripts/rollout-ghcr.sh
