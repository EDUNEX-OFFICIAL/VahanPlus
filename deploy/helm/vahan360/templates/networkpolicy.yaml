{{- if .Values.networkPolicy.enabled }}
{{- if .Values.web.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vahan360.fullname" . }}-web
  labels:
    {{- include "vahan360.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: web
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.web.port }}
          protocol: TCP
  egress:
    - ports:
        - port: {{ .Values.apiExpress.port }}
          protocol: TCP
      to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: api-express
              app.kubernetes.io/instance: {{ .Release.Name }}
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
{{- end }}
{{- if .Values.apiExpress.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vahan360.fullname" . }}-api-express
  labels:
    {{- include "vahan360.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api-express
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.apiExpress.port }}
          protocol: TCP
  egress:
    - ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
{{- end }}
{{- if .Values.worker.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vahan360.fullname" . }}-worker
  labels:
    {{- include "vahan360.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
{{- end }}
