global:
  imagePullPolicy: IfNotPresent
  imageRegistry: ""
  imagePullSecrets: []
  podSecurityContext: {}
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

apiExpress:
  enabled: true
  replicaCount: 1
  image: vahan360-api-express:latest
  port: 3001
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

apiNest:
  enabled: false
  replicaCount: 1
  image: vahan360-api-nest:latest
  port: 3002
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

web:
  enabled: true
  replicaCount: 1
  image: vahan360-web:latest
  port: 3000
  # NEXT_PUBLIC_API_URL is baked at Docker build time (see docker-publish workflow).
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  enabled: true
  replicaCount: 1
  image: vahan360-worker:latest
  healthPort: 8080
  browserPoolStub: true
  concurrency: 4
  portalRateLimitMax: 2
  portalRateLimitDurationMs: 1000
  portalPostDelayMs: 1000
  fanoutStaggerMs: 0
  fetchTimeoutMs: 30000
  fetchRetries: 3
  storeRawCapture: false
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

# Hybrid prod: set secrets.databaseUrl / secrets.redisUrl to managed service URLs.
# postgresql/redis host fields are documentation only (not wired into templates).
postgresql:
  host: postgres
  port: 5432
  database: vahan360

redis:
  host: redis
  port: 6379

networkPolicy:
  enabled: false

hpa:
  enabled: false
  apiExpress:
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  web:
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  host: vahan360.local
  className: nginx
  tls:
    enabled: false
    secretName: vahan360-tls

migrate:
  enabled: true
  backoffLimit: 3

pdb:
  enabled: true
  minAvailable: 1

monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
    path: /metrics

otel:
  endpoint: ""

secrets:
  # Set to pre-created Secret name in production (see docs/ops/k8s-cutover.md).
  existingSecret: ""
  jwtSecret: change-me-in-production
  databaseUrl: postgresql://vahan360:vahan360@postgres:5432/vahan360
  redisUrl: redis://redis:6379
