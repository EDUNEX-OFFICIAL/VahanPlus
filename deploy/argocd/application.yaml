# Production Argo CD Application — set spec.source.repoURL to your Git remote before sync.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vahanplus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/VahanPlus.git
    targetRevision: main
    path: deploy/helm/vahanplus
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vahanplus
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    # Production: enable manual sync or approval workflow instead of full automation.
    automated:
      prune: true
      selfHeal: true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
