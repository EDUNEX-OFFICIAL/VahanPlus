# Staging Argo CD Application — update spec.source.repoURL to your Git remote.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vahan360-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/vahan360.git
    targetRevision: main
    path: deploy/helm/vahan360
    helm:
      valueFiles:
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: vahan360-staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
